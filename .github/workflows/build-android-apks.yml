name: Build Android APKs

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'style.css'
      - 'vendor.html'
      - 'vendor.css'
      - 'android-apps/**'
      - '.github/workflows/build-android-apks.yml'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Customer APK
  # ─────────────────────────────────────────
  build-customer-apk:
    name: Customer App APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: android-apps/customer/package.json

      - name: Copy web assets (Customer)
        run: |
          cp index.html  android-apps/customer/www/index.html
          cp style.css   android-apps/customer/www/style.css

      - name: Install Capacitor dependencies (Customer)
        working-directory: android-apps/customer
        run: npm install

      - name: Add Android platform (Customer)
        working-directory: android-apps/customer
        run: npx cap add android

      - name: Sync web assets into Android project (Customer)
        working-directory: android-apps/customer
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable (Customer)
        working-directory: android-apps/customer/android
        run: chmod +x gradlew

      - name: Build Customer APK
        working-directory: android-apps/customer/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Customer APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: SEVK-Customer-APK
          path: android-apps/customer/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # Vendor APK
  # ─────────────────────────────────────────
  build-vendor-apk:
    name: Vendor App APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: android-apps/vendor/package.json

      - name: Copy web assets (Vendor)
        run: |
          cp vendor.html android-apps/vendor/www/index.html
          cp vendor.css  android-apps/vendor/www/vendor.css

      - name: Install Capacitor dependencies (Vendor)
        working-directory: android-apps/vendor
        run: npm install

      - name: Add Android platform (Vendor)
        working-directory: android-apps/vendor
        run: npx cap add android

      - name: Sync web assets into Android project (Vendor)
        working-directory: android-apps/vendor
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable (Vendor)
        working-directory: android-apps/vendor/android
        run: chmod +x gradlew

      - name: Build Vendor APK
        working-directory: android-apps/vendor/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Vendor APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: SEVK-Vendor-APK
          path: android-apps/vendor/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
